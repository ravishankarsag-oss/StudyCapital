name = "studycapital-form-handler"
main = "worker.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# ── D1 Database Binding ────────────────────────────────────────────────────
# After running `wrangler d1 create studycapital-leads`, replace the
# database_id below with the UUID printed in the terminal output.
[[d1_databases]]
binding = "DB"
database_name = "studycapital-leads"
database_id = "68e02d3e-6bfa-4f4c-bf2d-643a74fde434"

# ── Routes ────────────────────────────────────────────────────────────────
