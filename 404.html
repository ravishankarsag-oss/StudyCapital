<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting… | StudyCapital</title>
  <script>
    // GitHub Pages doesn't support .htaccess redirects.
    // This script handles trailing-slash and clean-URL redirects.
    (function() {
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;

      // If path doesn't end with / and doesn't have a file extension, add trailing slash
      if (path.slice(-1) !== '/' && path.indexOf('.') === -1) {
        window.location.replace('https://www.studycapital.in' + path + '/' + search + hash);
        return;
      }

      // If reached here it's a genuine 404 — redirect to homepage after 3s
      document.getElementById('msg').style.display = 'block';
      setTimeout(function() {
        window.location.replace('https://www.studycapital.in/');
      }, 3000);
    })();
  </script>
</head>
<body style="font-family:sans-serif;text-align:center;padding:60px 20px;color:#333">
  <div id="msg" style="display:none">
    <h1 style="font-size:48px;margin:0">404</h1>
    <p style="font-size:18px">Page not found. Redirecting you to the homepage…</p>
    <p><a href="https://www.studycapital.in/" style="color:#1a73e8">Click here if not redirected</a></p>
  </div>
</body>
</html>
